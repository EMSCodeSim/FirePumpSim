name: firepumpsim
description: "Fire pump operator training scenarios, formulas, calculator tools, and printable pump practice."
publish_to: "none"

version: 1.0.6

environment:
  sdk: ^3.6.0
dependencies:
  shared_preferences: ^2.0.0
  printing: ^5.0.0
  pdf: ^3.0.0
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  go_router: ^16.2.0
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/scenarios/
    - assets/printable/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/dreamflow_icon.jpg
  remove_alpha_ios: true
